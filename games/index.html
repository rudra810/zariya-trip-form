<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Stake - Mines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700;800&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <main class="app">
      <header class="brand-wrap">
        <div class="logo" aria-label="Mis Stake logo">
          <span class="logo-mark">M</span>
          <span class="logo-text">mi</span>
          <img
            class="logo-stake-img"
            src="assets/Screenshot 2026-04-08 043309.png"
            alt="Stake"
          />
        </div>
      </header>

      <section class="panel controls">
        <label for="amount">Enter Amount</label>
        <div class="amount-row">
          <span class="currency">₹</span>
          <input id="amount" type="number" min="1" step="1" value="100" />
        </div>
        <button id="startBtn" type="button">Start Round</button>
        <button id="cashoutBtn" class="secondary" type="button" disabled>Discount Out</button>
        <p id="status" class="status">Set your amount and start a round.</p>
      </section>

      <section class="panel board-panel">
        <div class="board-header">
          <h1>Mines Board</h1>
          <span class="pill">25 Tiles</span>
        </div>
        <div id="board" class="board" aria-label="Mines game board"></div>
      </section>

      <section class="panel stats">
        <h2>Discount Tracker</h2>
        <div class="stats-grid">
          <div>
            <p class="k">Opened Gems</p>
            <p id="openedGems" class="v">0 / 12</p>
          </div>
          <div>
            <p class="k">Discount Rate</p>
            <p id="discountRate" class="v">0%</p>
          </div>
          <div>
            <p class="k">Original Amount</p>
            <p id="originalAmount" class="v">₹0.00</p>
          </div>
          <div>
            <p class="k">Discount Value</p>
            <p id="discountValue" class="v">₹0.00</p>
          </div>
          <div>
            <p class="k">Amount After Discount</p>
            <p id="discountedAmount" class="v highlight">₹0.00</p>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
